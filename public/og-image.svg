<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1729;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#160d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Ambient glow circles -->
  <circle cx="200" cy="150" r="300" fill="#6366f1" opacity="0.06" filter="url(#blur)" />
  <circle cx="1050" cy="500" r="250" fill="#8b5cf6" opacity="0.07" filter="url(#blur)" />

  <!-- Subtle grid pattern -->
  <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04" />
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" />

  <!-- Left accent line -->
  <rect x="80" y="140" width="3" height="200" fill="url(#accent)" rx="2" />

  <!-- IDE-style comment line -->
  <text x="104" y="175" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="18" fill="#4ade80" opacity="0.7">// portfolio.tsx</text>

  <!-- Main name -->
  <text x="104" y="290" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="#f1f5f9" letter-spacing="-2">Yash Ajay Magar</text>

  <!-- Role / tagline -->
  <text x="104" y="355" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8" letter-spacing="0">AI Enthusiast · Developer · Entrepreneur · Diploma Student</text>

  <!-- Separator line -->
  <line x1="104" y1="395" x2="620" y2="395" stroke="#334155" stroke-width="1" />

  <!-- Tagline -->
  <text x="104" y="430" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="20" fill="#6366f1" opacity="0.9">shipping software from a college hostel room</text>

  <!-- Tech badges -->
  <g transform="translate(104, 470)">
    <rect x="0" y="0" width="100" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="50" y="21" font-family="'JetBrains Mono', monospace" font-size="13" fill="#94a3b8" text-anchor="middle">React</text>

    <rect x="116" y="0" width="130" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="181" y="21" font-family="'JetBrains Mono', monospace" font-size="13" fill="#94a3b8" text-anchor="middle">TypeScript</text>

    <rect x="262" y="0" width="90" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="307" y="21" font-family="'JetBrains Mono', monospace" font-size="13" fill="#94a3b8" text-anchor="middle">Next.js</text>

    <rect x="368" y="0" width="120" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="428" y="21" font-family="'JetBrains Mono', monospace" font-size="13" fill="#94a3b8" text-anchor="middle">Supabase</text>

    <rect x="504" y="0" width="60" height="32" rx="6" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1" stroke-opacity="0.5" />
    <text x="534" y="21" font-family="'JetBrains Mono', monospace" font-size="13" fill="#818cf8" text-anchor="middle">AI</text>
  </g>

  <!-- Domain watermark bottom-right -->
  <text x="1120" y="590" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#6366f1" text-anchor="end" opacity="0.9">magar.xyz</text>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accent)" />
</svg>
